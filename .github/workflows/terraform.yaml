name: Terraform

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yaml"
      - "terraform/**"
      - "lambda/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Lambda zip
        working-directory: lambda
        run: |
          rm -f lambda.zip
          zip -r lambda.zip . -x "lambda.zip" "__pycache__/*" "*.pyc"

      - name: Verify Lambda zip exists
        working-directory: .
        run: test -f lambda/lambda.zip

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Verify Terraform formatting
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Skip plan when AWS credentials are missing
        if: ${{ secrets.AWS_ACCESS_KEY_ID == '' || secrets.AWS_SECRET_ACCESS_KEY == '' }}
        working-directory: .
        run: |
          echo "Skipping terraform plan because AWS credentials are not configured in GitHub Actions secrets."
          echo "Add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY to run the plan step."

      - name: Terraform plan
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: us-east-1
        run: terraform plan -input=false -var-file=terraform.tvars
